<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Jogador</title>
</head>
<body>
    <h1>Cadastrar Jogador</h1>

    <form id="formJogador">
        <input type="text" placeholder="Nome" id="nome">
        <input type="date" placeholder="Data de Nascimento" id="dataNasc">
        <input type="text" placeholder="Posição" id="posicao">
        <label>Foto do Jogador</label>
        <input type="file" id="foto" accept="image/*">
        <label>Documento do Jogador</label>
        <input type="file" id="documento" accept=".pdf,.doc,.docx">

        <button type="submit">Cadastar</button>
    </form>
<script src="../js/jogador.js"></script>
</body>
</html>
